name: Deploy Supabase Edge Functions

on:
  push:
    branches: [ main, master ]
    paths:
      - 'supabase/config.toml'
      - 'supabase/functions/**'
      - '.github/workflows/supabase-functions-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: nvjjifnzwrueutbirpde
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy parseBrochurePrizesV2
        run: supabase functions deploy parseBrochurePrizesV2 --project-ref "$PROJECT_REF"
